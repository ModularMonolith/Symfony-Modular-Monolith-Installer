name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and release modulith.phar
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          ini-values: phar.readonly=0

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build PHAR
        run: INSTALLER_VERSION=${{ steps.version.outputs.value }} bash scripts/build-phar.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Modulith v${{ steps.version.outputs.value }}"
          generate_release_notes: true
          files: build/modulith.phar
